<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PetCare - Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6DQD1KQ2U5r3y5lZP6Gkz0WLa4xZyR8BOeG5l5U5Qv8Q" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="card-title text-center mb-4">Bienvenido a PetCare</h1>
                        <form id="petForm" action="https://aponte.app.n8n.cloud/webhook/formulario-PetCare"
                            method="POST">
                            <div class="mb-3">
                                <label for="owner" class="form-label">Nombre del dueño</label>
                                <input type="text" class="form-control" id="owner" name="owner" required />
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" name="email" required />
                            </div>
                            <div class="mb-3">
                                <label for="petName" class="form-label">Nombre de la mascota</label>
                                <input type="text" class="form-control" id="petName" name="petName" required />
                            </div>
                            <div class="mb-3">
                                <label for="petType" class="form-label">Tipo de mascota</label>
                                <select class="form-select" id="petType" name="petType">
                                    <option value="perro">Perro</option>
                                    <option value="gato">Gato</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Enviar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- <script src="script.js"></script> -->
</body>

</html>
